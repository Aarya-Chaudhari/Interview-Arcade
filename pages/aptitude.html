<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Aptitude Quiz</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: "Poppins", sans-serif;
}

body {
  background: #f4f6fb;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.container {
  width: 500px;
  background: white;
  padding: 30px;
  border-radius: 16px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.08);
}

h2 {
  margin-bottom: 10px;
  color: #333;
}

.top-bar {
  display: flex;
  justify-content: space-between;
  margin-bottom: 15px;
  color: #666;
}

.question {
  margin: 15px 0;
  font-weight: 500;
}

.option {
  background: #f1f3f6;
  padding: 10px;
  margin: 8px 0;
  border-radius: 8px;
  cursor: pointer;
  transition: 0.2s;
}

.option:hover {
  background: #e4e8ee;
}

.explanation {
  margin-top: 10px;
  font-size: 0.9rem;
  color: #777;
}

.result {
  text-align: center;
}

button {
  margin-top: 15px;
  padding: 10px 20px;
  border: none;
  border-radius: 8px;
  background: #4f46e5;
  color: white;
  cursor: pointer;
}

button:hover {
  background: #4338ca;
}
</style>
</head>

<body>

<div class="container" id="quizBox">
  <h2>Aptitude Quiz</h2>

  <div class="top-bar">
    <span id="progress">Q1/5</span>
    <span id="timer">10s</span>
  </div>

  <div class="question" id="question"></div>
  <div id="options"></div>
  <div class="explanation" id="explanation"></div>
</div>

<div class="container result" id="resultBox" style="display:none;">
  <h2>Quiz Result</h2>
  <p id="scoreText"></p>
  <p id="performance"></p>
  <button onclick="restartQuiz()">Restart</button>
</div>

<script defer src="../games/aptitude.js"></script>
</body>
</html>
